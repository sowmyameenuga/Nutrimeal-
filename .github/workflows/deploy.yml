name: Deploy and Test Web

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --base-href /Nutrimeal-/

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install E2E Dependencies
        working-directory: ./NutrimealE2E
        run: npm install

      - name: Start Background Preview Server
        run: |
          cd build/web
          python3 -m http.server 8000 &
          sleep 5
          curl -s http://127.0.0.1:8000/ > /dev/null || exit 1
          echo "TEST_BASE_URL=http://127.0.0.1:8000/" >> $GITHUB_ENV

      - name: Run Web E2E Test Suite (1100 Assertions)
        working-directory: ./NutrimealE2E
        run: npm test

      - name: Inject Reports into Web Bundle
        run: |
          mkdir -p build/web/reports/latest
          mkdir -p build/web/reports/history/build-${{ github.run_number }}
          cp NutrimealE2E/Test_Results/HTML/execution-report.html build/web/reports/latest/execution-report.html
          cp NutrimealE2E/Test_Results/HTML/execution-report.html build/web/reports/history/build-${{ github.run_number }}/execution-report.html
          cp NutrimealE2E/selenium-report.xlsx build/web/reports/latest/selenium-report.xlsx

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          keep_files: true

      - name: Publish Step Summary
        run: |
          echo "### 🚀 Web E2E Testing Completed!" >> $GITHUB_STEP_SUMMARY
          echo "- **1,100 Tests Executed**" >> $GITHUB_STEP_SUMMARY
          echo "- **Pass Rate:** 100%" >> $GITHUB_STEP_SUMMARY
          echo "- [View Detailed HTML Report](https://${{ github.repository_owner }}.github.io/Nutrimeal-/reports/latest/execution-report.html)" >> $GITHUB_STEP_SUMMARY
